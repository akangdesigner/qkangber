<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans TC',sans-serif; background:#0a0a12; color:#e2e8f0; min-height:100vh; overflow:hidden; position:relative; }
  body::before { content:''; position:absolute; inset:0;
    background: radial-gradient(60% 50% at 50% 0%, #6366f148 0%, transparent 70%),
                radial-gradient(40% 40% at 80% 30%, #3b82f630 0%, transparent 70%);
    pointer-events:none; }
  nav { position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:0 auto; padding:22px 32px; }
  .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; color:#fff; }
  .logo .dot { width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#3b82f6); }
  .nav-links { display:flex; gap:28px; font-size:14px; color:#94a3b8; }
  .nav-cta { background:linear-gradient(135deg,#6366f1,#3b82f6); color:#fff; padding:9px 18px; border-radius:12px; font-size:14px; font-weight:600; border:none; }
  .hero { position:relative; z-index:2; max-width:820px; margin:64px auto 0; text-align:center; padding:0 24px; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:7px 16px; border-radius:999px; background:#6366f11a; border:1px solid #6366f140; font-size:13px; color:#e2e8f0; margin-bottom:28px; }
  h1 { font-size:62px; line-height:1.1; font-weight:800; letter-spacing:-0.02em; color:#fff; margin-bottom:24px; }
  h1 .grad { background:linear-gradient(90deg,#6366f1,#3b82f6,#a78bfa); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { font-size:19px; line-height:1.7; color:#94a3b8; max-width:560px; margin:0 auto 36px; }
  .btns { display:flex; gap:14px; justify-content:center; margin-bottom:72px; }
  .btn-primary { background:linear-gradient(135deg,#6366f1,#3b82f6); color:#fff; padding:15px 30px; border-radius:14px; font-size:15px; font-weight:600; border:none; box-shadow:0 12px 32px #6366f166; }
  .btn-ghost { background:rgba(255,255,255,0.04); color:#e2e8f0; border:1px solid rgba(255,255,255,0.12); padding:15px 30px; border-radius:14px; font-size:15px; font-weight:600; }
  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; max-width:1080px; margin:0 auto; padding:0 24px; }
  .card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:28px; text-align:left; }
  .card .ic { width:46px; height:46px; border-radius:12px; background:#6366f11f; display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .card h3 { font-size:18px; font-weight:600; color:#fff; margin-bottom:8px; }
  .card p { font-size:14px; line-height:1.65; color:#94a3b8; }
  svg { stroke:#6366f1; }
</style>
</head>
<body>
  <nav>
    <div class="logo"><span class="dot"></span> LawBot</div>
    <div class="nav-links"><span>服務</span><span>方案</span><span>成功案例</span><span>關於</span></div>
    <button class="nav-cta">開始使用</button>
  </nav>
  <section class="hero">
    <span class="badge">✨ AI 驅動的法律諮詢</span>
    <h1>用 AI 看懂<br><span class="grad">每一份合約</span></h1>
    <p class="sub">強大、直覺、好上手。讓條文不再像天書，把風險交給自動化。</p>
    <div class="btns">
      <button class="btn-primary">免費開始 →</button>
      <button class="btn-ghost">預約展示</button>
    </div>
  </section>
  <section class="cards">
    <div class="card">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div>
      <h3>快速高效</h3><p>毫秒級掃描合約地雷，不再等待。</p>
    </div><div class="card">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
      <h3>安全可靠</h3><p>企業級的機密保護，讓你安心上傳文件。</p>
    </div><div class="card">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></div>
      <h3>數據洞察</h3><p>即時儀表板，把每一個條款都建立在數據之上。</p>
    </div>
  </section>
</body>
</html>
